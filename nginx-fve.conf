server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;

    server_name _;

    # Hlavní stránka
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache headers — stránka se mění každých 5 minut
    location = /index.html {
        add_header Cache-Control "public, max-age=300";
    }

    # Zakázat přístup ke skrytým souborům
    location ~ /\. {
        deny all;
    }

    # Jednoduchý health check pro monitoring
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Logování
    access_log /var/log/nginx/fve-access.log;
    error_log /var/log/nginx/fve-error.log;
}
